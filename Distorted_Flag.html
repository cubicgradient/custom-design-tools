<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Typography System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400;700;800&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            font-family: 'Martian Mono', monospace !important;
        }

        body { 
            background: #0a0a0a;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        #canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #000;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #222;
        }

        canvas { 
            border: 1px solid #333;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #controls {
            background: #111;
            padding: 0;
            width: 420px;
            height: 100%; 
            overflow: hidden;
            border: 1px solid #222;
            margin-left: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
        }

        #controls-content {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            padding-bottom: 10px;
        }

        #controls-content::-webkit-scrollbar { display: none; }

        #controls-footer {
            background: #111;
            border-top: 1px solid #222;
            padding: 20px 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #controls-footer .footer-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #controls-footer .footer-row-export {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        #controls-footer .footer-col-left {
            width: 160px;
            display: flex;
            align-items: center;
        }

        #controls-footer .footer-row-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        #controls-footer .footer-row-export button,
        #animate-toggle {
            margin-top: 0;
        }

        #animate-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 11px;
        }

        #animate-toggle::before {
            content: '▶';
            font-size: 10px;
            transition: all 0.2s;
        }

        #animate-toggle.playing::before {
            content: '⏸';
        }

        #controls-footer label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            font-weight: 700; /* BOLD */
            margin: 0;
            cursor: pointer;
            white-space: nowrap;
        }

        #controls-footer input[type="checkbox"] {
            margin-right: 8px;
            cursor: pointer;
        }

        #controls::-webkit-scrollbar { display: none; }

        .section { 
            margin-bottom: 25px; 
            padding-bottom: 20px; 
            border-bottom: 1px solid #222; 
        }

        .section-title { 
            font-size: 13px; 
            font-weight: 800; /* EXTRA BOLD */
            margin-bottom: 15px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            color: #fff;
        }

        .control { margin-bottom: 14px; }

        label { 
            font-size: 10px; 
            color: #888; 
            text-transform: uppercase; 
            display: block; 
            margin-bottom: 6px;
            font-weight: 300; /* LIGHT */
        }

        input[type="range"] { width: 100%; accent-color: #fff; cursor: pointer; }
        input[type="text"], select { 
            width: 100%; background: #1a1a1a; border: 1px solid #333; 
            color: #fff; padding: 10px; border-radius: 6px; font-size: 11px; 
        }
        input[type="color"] { 
            width: 100%; height: 35px; border: 1px solid #333; 
            cursor: pointer; background: #1a1a1a; border-radius: 6px; 
        }
        button { 
            width: 100%; background: #fff; color: #000; border: none; 
            padding: 12px; border-radius: 6px; cursor: pointer; 
            font-size: 11px; font-weight: 700; margin-top: 10px; 
        }
        button:hover { background: #e0e0e0; }
        .val { color: #fff; font-weight: 700; float: right; font-size: 10px; }
        .file-drop-zone {
            border: 1px dashed #444; border-radius: 6px; padding: 15px;
            text-align: center; cursor: pointer; background: #161616;
            font-size: 9px; color: #666; margin-top: 5px;
            transition: all 0.3s;
        }
        .file-drop-zone:hover { border-color: #666; background: #1a1a1a; }
        .file-drop-zone.drag-over { border-color: #fff; background: #222; }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas" width="800" height="1200"></canvas>
    </div>
    
    <div id="controls">
        <div id="controls-content">
        <div class="section">
            <div class="section-title">Grid Settings</div>
            <div class="control">
                <label>Columns <span class="val" id="v-cols">64</span></label>
                <input type="range" id="cols" min="20" max="200" value="64">
            </div>
            <div class="control">
                <label>Rows <span class="val" id="v-rows">92</span></label>
                <input type="range" id="rows" min="30" max="250" value="92">
            </div>
            <div class="control">
                <label>Spacing <span class="val" id="v-spacing">9</span></label>
                <input type="range" id="spacing" min="3" max="25" value="9">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Particles</div>
            <div class="control">
                <label>Shape</label>
                <select id="shape">
                    <option value="triangle">Triangle</option>
                    <option value="circle">Circle</option>
                    <option value="square">Square</option>
                    <option value="custom">Custom SVG</option>
                </select>
            </div>
            <div class="control">
                <label>Upload SVG Particle</label>
                <input type="file" id="custom-particle" accept="image/svg+xml,.svg" style="display:none;">
                <div class="file-drop-zone" id="particle-drop">Click or drag SVG</div>
            </div>
            <div class="control">
                <label><input type="checkbox" id="dual-shape"> Dual Shape Mode</label>
            </div>
            <div class="control" id="shape-b-control" style="display:none;">
                <label>Shape B</label>
                <select id="shape-b">
                    <option value="triangle">Triangle</option>
                    <option value="circle">Circle</option>
                    <option value="square">Square</option>
                    <option value="custom">Custom SVG</option>
                </select>
            </div>
            <div class="control" id="shape-b-svg-control" style="display:none;">
                <label>Upload SVG Particle B</label>
                <input type="file" id="custom-particle-b" accept="image/svg+xml,.svg" style="display:none;">
                <div class="file-drop-zone" id="particle-drop-b">Click or drag SVG</div>
            </div>
            <div class="control" id="shape-ratio-control" style="display:none;">
                <label>Shape A Ratio <span class="val" id="v-shape-ratio">50</span>%</label>
                <input type="range" id="shape-ratio" min="0" max="100" value="50">
            </div>
            <div class="control" id="size-a-control">
                <label>Size A <span class="val" id="v-size">11</span></label>
                <input type="range" id="size" min="2" max="30" value="11">
            </div>
            <div class="control" id="size-b-control" style="display:none;">
                <label>Size B <span class="val" id="v-size-b">11</span></label>
                <input type="range" id="size-b" min="2" max="30" value="11">
            </div>
            <div class="control">
                <label>Rotation <span class="val" id="v-rotation">0</span>°</label>
                <input type="range" id="rotation" min="0" max="360" value="0">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Colors</div>
            <div class="control">
                <label>Background</label>
                <input type="color" id="bgcolor" value="#ffffff">
            </div>
            <div class="control">
                <label>Particle</label>
                <input type="color" id="fgcolor" value="#000000">
            </div>
            <div class="control">
                <label><input type="checkbox" id="dual-color"> Dual Color Mode</label>
            </div>
            <div class="control">
                <label>Color B</label>
                <input type="color" id="color-b" value="#ff0000">
            </div>
            <div class="control">
                <label>Color A Ratio <span class="val" id="v-color-ratio">50</span>%</label>
                <input type="range" id="color-ratio" min="0" max="100" value="50">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Distortion</div>
            <div class="control">
                <label>Type</label>
                <select id="disttype">
                    <option value="wave">Multi-Wave</option>
                    <option value="perlin">Perlin</option>
                    <option value="flow">Flow Field</option>
                    <option value="radial">Radial</option>
                    <option value="turbulence" selected>Turbulence</option>
                </select>
            </div>
            <div class="control">
                <label>Intensity <span class="val" id="v-intensity">43</span></label>
                <input type="range" id="intensity" min="0" max="300" value="43">
            </div>
            <div class="control">
                <label>Scale <span class="val" id="v-scale">0.010</span></label>
                <input type="range" id="scale" min="0.001" max="0.1" step="0.001" value="0.010">
            </div>
            <div class="control">
                <label>Speed <span class="val" id="v-speed">0.24</span></label>
                <input type="range" id="speed" min="0" max="3" step="0.01" value="0.24">
            </div>
            <div class="control">
                <label>Complexity <span class="val" id="v-complex">3</span></label>
                <input type="range" id="complex" min="1" max="12" value="3">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Typography</div>
            <div class="control">
                <label>Input Mode</label>
                <select id="typo-mode">
                    <option value="text">Text Input</option>
                    <option value="svg">SVG Upload</option>
                </select>
            </div>
            <div class="control">
                <label>Typography Mode</label>
                <select id="typo-behavior">
                    <option value="subtract">Subtract from Surface</option>
                    <option value="reveal">Reveal Only Typography</option>
                    <option value="layer">Distorted Typography Layer</option>
                </select>
            </div>
            <div class="control" id="layer-options" style="display:none;">
                <label><input type="checkbox" id="hide-bg"> Hide Background Surface</label>
            </div>
            <div class="control" id="text-group">
                <label>Text</label>
                <input type="text" id="text" value="Flag">
            </div>
            <div class="control" id="svg-group" style="display:none;">
                <label>Upload Typography SVG</label>
                <input type="file" id="typo-svg" accept="image/svg+xml,.svg" style="display:none;">
                <div class="file-drop-zone" id="typo-drop">Click or drag SVG</div>
            </div>
            <div class="control" id="svg-scale-control" style="display:none;">
                <label>SVG Scale <span class="val" id="v-svg-scale">100</span>%</label>
                <input type="range" id="svg-scale" min="10" max="200" value="100">
            </div>
            <div class="control" id="font-group">
                <label>Upload Custom Font</label>
                <input type="file" id="custom-font" accept=".ttf,.otf,.woff,.woff2" style="display:none;">
                <div class="file-drop-zone" id="font-drop">Click or drag font</div>
            </div>
            <div class="control" id="text-size-group">
                <label>Font Size <span class="val" id="v-fontsize">205</span></label>
                <input type="range" id="fontsize" min="20" max="800" value="205">
            </div>
            <div class="control" id="text-spacing-group">
                <label>Line Spacing <span class="val" id="v-linespacing">1.0</span></label>
                <input type="range" id="linespacing" min="0.8" max="2.0" step="0.1" value="1.0">
            </div>
            <div class="control" id="text-position-group">
                <label>Text X <span class="val" id="v-text-x">3</span></label>
                <input type="range" id="text-x" min="-400" max="400" value="3">
            </div>
            <div class="control" id="text-position-group-y">
                <label>Text Y <span class="val" id="v-text-y">260</span></label>
                <input type="range" id="text-y" min="-600" max="600" value="260">
            </div>
        </div>
        </div>

        <div id="controls-footer">
            <div class="footer-row">
                <div class="footer-col-left">
                    <label><input type="checkbox" id="invert"> Invert Mask</label>
                </div>
                <div class="footer-row-buttons">
                    <button id="animate-toggle" class="playing" onclick="toggleAnimation()">Pause</button>
                </div>
            </div>
            <div class="footer-row-export">
                <div class="footer-col-left">
                    <label><input type="checkbox" id="transparent-bg"> Transparent BG</label>
                </div>
                <div class="footer-row-buttons">
                    <button onclick="exportPNG()">Export PNG</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let params = {
            cols: 64, rows: 92, spacing: 9, size: 11, shape: 'triangle',
            rotation: 0,
            bgColor: '#ffffff', fgColor: '#000000',
            dualColor: false, colorB: '#ff0000', colorRatio: 50,
            dualShape: false, shapeB: 'circle', shapeRatio: 50, sizeB: 11,
            distType: 'turbulence', intensity: 43, scale: 0.010, speed: 0.24, complex: 3,
            text: 'Flag', fontSize: 205, lineSpacing: 1.0, textAlign: 'center', textX: 3, textY: 260,
            invert: false, animate: true, transparentBg: false,
            typoMode: 'text', typoBehavior: 'subtract', customFont: 'Arial', hideBg: false,
            hideTypoSvgBg: false, svgScale: 100
        };
        
        let particles = [];
        let typoParticles = [];
        let time = 0;
        let customParticlePath = null;
        let customParticlePathString = null;
        let customParticlePathB = null;
        let customParticlePathStringB = null;
        let typoMaskCanvas = null;
        let originalTypoSvgContent = null; // Store original typography SVG

        class Particle {
            constructor(x, y) {
                this.ox = x; this.oy = y;
                this.x = x; this.y = y;
                this.visible = true;
                this.size = 1;
                this.rot = 0;
                // Assign color based on ratio (Color A vs Color B)
                this.useColorB = Math.random() * 100 > params.colorRatio;
                // Assign shape based on ratio (Shape A vs Shape B)
                this.useShapeB = Math.random() * 100 > params.shapeRatio;
            }
        }

        function noise(x, y, z = 0) {
            return (Math.sin(x * 0.1) * Math.cos(y * 0.1) + Math.sin(y * 0.1 + z) * Math.cos(x * 0.1)) / 2;
        }

        function distort(x, y, t) {
            let dx = 0, dy = 0;
            
            if (params.distType === 'wave') {
                for (let i = 0; i < params.complex; i++) {
                    const f = (i + 1) * 0.5;
                    const a = params.intensity / (i + 1);
                    const p = t * params.speed * (1 + i * 0.3);
                    dx += Math.sin((y * params.scale * f + p) * Math.PI * 2) * a;
                    dy += Math.cos((x * params.scale * f * 0.7 + p * 0.8) * Math.PI * 2) * a * 0.6;
                }
            } else if (params.distType === 'perlin') {
                for (let i = 0; i < params.complex; i++) {
                    const f = Math.pow(2, i);
                    const a = 1 / f;
                    dx += noise(x * params.scale * f + t * params.speed, y * params.scale * f, 0) * params.intensity * a;
                    dy += noise(x * params.scale * f + 1000, y * params.scale * f + 1000, t * params.speed * 0.5) * params.intensity * a;
                }
            } else if (params.distType === 'flow') {
                const eps = 2;
                for (let i = 0; i < params.complex; i++) {
                    const f = (i + 1) * 0.8;
                    const a = params.intensity / (i + 1);
                    const tx = t * params.speed;
                    const n1 = noise(x * params.scale * f, (y + eps) * params.scale * f, tx);
                    const n2 = noise(x * params.scale * f, (y - eps) * params.scale * f, tx);
                    const n3 = noise((x + eps) * params.scale * f, y * params.scale * f, tx);
                    const n4 = noise((x - eps) * params.scale * f, y * params.scale * f, tx);
                    dx += (n1 - n2) * a * 3;
                    dy += -(n3 - n4) * a * 3;
                }
            } else if (params.distType === 'radial') {
                const cx = canvas.width / 2, cy = canvas.height / 2;
                const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
                const force = params.intensity * (Math.sin(t * params.speed) * 0.5 + 0.5) / Math.pow(dist / 100 + 1, 1.5);
                dx = ((x - cx) / dist) * force;
                dy = ((y - cy) / dist) * force;
            } else if (params.distType === 'turbulence') {
                for (let i = 0; i < params.complex; i++) {
                    const f = Math.pow(2, i);
                    const a = params.intensity / f;
                    const angle = noise(x * params.scale * f, y * params.scale * f, t * params.speed) * Math.PI * 4;
                    dx += Math.cos(angle) * a;
                    dy += Math.sin(angle) * a;
                }
            }
            
            return { dx, dy };
        }

        function generateGrid() {
            particles = [];
            const ox = (canvas.width - (params.cols - 1) * params.spacing) / 2;
            const oy = (canvas.height - (params.rows - 1) * params.spacing) / 2;
            
            for (let r = 0; r < params.rows; r++) {
                for (let c = 0; c < params.cols; c++) {
                    const x = ox + c * params.spacing;
                    const y = oy + r * params.spacing;
                    const p = new Particle(x, y);
                    p.rot = params.rotation;
                    particles.push(p);
                }
            }
        }

        function createMask() {
            if (typoMaskCanvas) {
                return typoMaskCanvas.getContext('2d');
            }
            
            const mc = document.createElement('canvas');
            mc.width = canvas.width;
            mc.height = canvas.height;
            const mctx = mc.getContext('2d');
            
            // Check input mode
            if (params.typoMode === 'svg') {
                // SVG mode - if no SVG uploaded yet, return empty mask
                // The mask will be created when SVG is uploaded
                return mctx;
            }
            
            // Text mode - render text to mask
            // Split text by | for line breaks
            const lines = params.text.split('|');
            
            mctx.fillStyle = '#fff';
            mctx.font = `bold ${params.fontSize}px ${params.customFont}, Arial`;
            mctx.textBaseline = 'middle';
            
            // Calculate total text block height
            const lineHeight = params.fontSize * params.lineSpacing;
            const totalHeight = lineHeight * lines.length;
            
            // Calculate starting Y position (centered vertically, then offset)
            const startY = (canvas.height - totalHeight) / 2 + lineHeight / 2 + params.textY;
            
            // Draw each line with proper alignment
            lines.forEach((line, i) => {
                const y = startY + i * lineHeight;
                
                // Apply alignment
                if (params.textAlign === 'center') {
                    mctx.textAlign = 'center';
                    mctx.fillText(line, canvas.width / 2 + params.textX, y);
                } else if (params.textAlign === 'left') {
                    mctx.textAlign = 'left';
                    mctx.fillText(line, canvas.width / 2 - 300 + params.textX, y);
                } else if (params.textAlign === 'right') {
                    mctx.textAlign = 'right';
                    mctx.fillText(line, canvas.width / 2 + 300 + params.textX, y);
                }
            });
            
            typoMaskCanvas = mc;
            return mctx;
        }

        function generateTypoGrid() {
            if (params.typoBehavior !== 'layer' && params.typoBehavior !== 'distorted') {
                typoParticles = [];
                return;
            }

            typoParticles = [];
            const maskCtx = createMask();
            const imageData = maskCtx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            const sampling = Math.max(3, Math.floor(params.spacing * 0.8));
            
            for (let y = 0; y < canvas.height; y += sampling) {
                for (let x = 0; x < canvas.width; x += sampling) {
                    const idx = (y * canvas.width + x) * 4;
                    if (data[idx + 3] > 128) {
                        const p = new Particle(x, y);
                        p.rot = params.rotation;
                        typoParticles.push(p);
                    }
                }
            }
        }

        function render() {
            const maskCtx = createMask();
            
            // All particles follow the SAME distortion field
            particles.forEach(p => {
                const d = distort(p.ox, p.oy, time);
                p.x = p.ox + d.dx;
                p.y = p.oy + d.dy;
            });
            
            // Typography particles ALSO follow the SAME distortion field
            if ((params.typoBehavior === 'layer' || params.typoBehavior === 'distorted') && typoParticles.length > 0) {
                typoParticles.forEach(p => {
                    const d = distort(p.ox, p.oy, time);
                    p.x = p.ox + d.dx;
                    p.y = p.oy + d.dy;
                    p.visible = true;
                });
            }
            
            // Apply typography as a visibility rule
            if (params.typoBehavior === 'subtract') {
                // Hide particles inside text
                particles.forEach(p => {
                    if (p.x < 0 || p.x >= canvas.width || p.y < 0 || p.y >= canvas.height) {
                        p.visible = false;
                    } else {
                        const data = maskCtx.getImageData(Math.floor(p.x), Math.floor(p.y), 1, 1).data;
                        const inside = data[3] > 128;
                        p.visible = params.invert ? inside : !inside;
                    }
                });
            } else if (params.typoBehavior === 'reveal') {
                // Show only particles inside text
                particles.forEach(p => {
                    if (p.x < 0 || p.x >= canvas.width || p.y < 0 || p.y >= canvas.height) {
                        p.visible = false;
                    } else {
                        const data = maskCtx.getImageData(Math.floor(p.x), Math.floor(p.y), 1, 1).data;
                        const inside = data[3] > 128;
                        p.visible = inside;
                    }
                });
            } else if (params.typoBehavior === 'layer') {
                // Layer mode: Background and typography both distort
                // Then hide background particles where distorted typography particles exist
                
                if (params.hideBg) {
                    // Just hide all background if option enabled
                    particles.forEach(p => p.visible = false);
                } else {
                    // Hide background particles that collide with distorted typography particles
                    const collisionDist = params.size * 1.8;
                    
                    particles.forEach(p => {
                        if (p.x < 0 || p.x >= canvas.width || p.y < 0 || p.y >= canvas.height) {
                            p.visible = false;
                            return;
                        }
                        
                        // Check collision with any typography particle
                        let collides = false;
                        for (let i = 0; i < typoParticles.length; i++) {
                            const tp = typoParticles[i];
                            const dx = p.x - tp.x;
                            const dy = p.y - tp.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            if (dist < collisionDist) {
                                collides = true;
                                break;
                            }
                        }
                        
                        // Apply invert: if invert is true, hide where NOT colliding
                        p.visible = params.invert ? collides : !collides;
                    });
                }
            } else if (params.typoBehavior === 'distorted') {
                // In distorted mode, hide all background particles - only show typoParticles
                particles.forEach(p => p.visible = false);
            }
            
            // Draw
            ctx.fillStyle = params.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw background particles
            particles.forEach(p => {
                if (!p.visible) return;
                
                // Set color based on dual color mode
                if (params.dualColor) {
                    ctx.fillStyle = p.useColorB ? params.colorB : params.fgColor;
                } else {
                    ctx.fillStyle = params.fgColor;
                }
                
                // Determine which shape and size to use
                let currentShape = params.shape;
                let currentCustomPath = customParticlePath;
                let currentSize = params.size;
                if (params.dualShape && p.useShapeB) {
                    currentShape = params.shapeB;
                    currentCustomPath = customParticlePathB;
                    currentSize = params.sizeB;
                }
                
                const s = currentSize * p.size;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot * Math.PI / 180);
                ctx.beginPath();
                
                if (currentShape === 'custom' && currentCustomPath) {
                    ctx.scale(s / 20, s / 20);
                    ctx.fill(currentCustomPath);
                } else if (currentShape === 'triangle') {
                    ctx.moveTo(0, -s/2);
                    ctx.lineTo(-s/2, s/2);
                    ctx.lineTo(s/2, s/2);
                    ctx.fill();
                } else if (currentShape === 'circle') {
                    ctx.arc(0, 0, s/2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.rect(-s/2, -s/2, s, s);
                    ctx.fill();
                }
                
                ctx.restore();
            });
            
            // Draw typography particles (same distortion as background!)
            // For layer mode: only draw if "Hide Background" is checked (otherwise it's negative space)
            // For distorted mode: always draw
            if ((params.typoBehavior === 'layer' && params.hideBg) || params.typoBehavior === 'distorted') {
                typoParticles.forEach(p => {
                    if (!p.visible) return;
                    
                    // Set color based on dual color mode
                    if (params.dualColor) {
                        ctx.fillStyle = p.useColorB ? params.colorB : params.fgColor;
                    } else {
                        ctx.fillStyle = params.fgColor;
                    }
                    
                    // Determine which shape and size to use (same as background particles)
                    let currentShape = params.shape;
                    let currentCustomPath = customParticlePath;
                    let currentSize = params.size;
                    if (params.dualShape && p.useShapeB) {
                        currentShape = params.shapeB;
                        currentCustomPath = customParticlePathB;
                        currentSize = params.sizeB;
                    }
                    
                    const s = currentSize * p.size;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.beginPath();
                    
                    if (currentShape === 'custom' && currentCustomPath) {
                        ctx.scale(s / 20, s / 20);
                        ctx.fill(currentCustomPath);
                    } else if (currentShape === 'triangle') {
                        ctx.moveTo(0, -s/2);
                        ctx.lineTo(-s/2, s/2);
                        ctx.lineTo(s/2, s/2);
                        ctx.fill();
                    } else if (currentShape === 'circle') {
                        ctx.arc(0, 0, s/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.rect(-s/2, -s/2, s, s);
                        ctx.fill();
                    }
                    
                    ctx.restore();
                });
            }
        }

        // Function to reprocess custom SVG when hide background changes
        function processTypoSvg() {
            if (!originalTypoSvgContent) return;
            
            // Always use the original SVG content for image loading
            const img = new Image();
            const blob = new Blob([originalTypoSvgContent], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            img.onerror = (e) => {
                console.error('Error loading typography SVG:', e);
                console.log('SVG Content:', originalTypoSvgContent.substring(0, 200));
                URL.revokeObjectURL(url);
            };
            
            img.onload = () => {
                const mc = document.createElement('canvas');
                mc.width = canvas.width;
                mc.height = canvas.height;
                const mctx = mc.getContext('2d');
                
                // Apply user's scale percentage
                const userScale = params.svgScale / 100;
                const baseScale = Math.min((canvas.width * 0.8) / img.width, (canvas.height * 0.8) / img.height);
                const scale = baseScale * userScale;
                
                const w = img.width * scale;
                const h = img.height * scale;
                
                // Use textX and textY for positioning (centered by default, then offset)
                const x = (canvas.width - w) / 2 + params.textX;
                const y = (canvas.height - h) / 2 + params.textY;
                
                mctx.drawImage(img, x, y, w, h);
                
                // If hide background is enabled, process the rendered canvas
                if (params.hideTypoSvgBg) {
                    // Get image data
                    const imageData = mctx.getImageData(0, 0, mc.width, mc.height);
                    const data = imageData.data;
                    
                    // Find the background color (sample from corners)
                    const bgColor = {
                        r: data[0],
                        g: data[1],
                        b: data[2]
                    };
                    
                    // Remove pixels that match the background color (with some tolerance)
                    const tolerance = 30;
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        
                        // Check if pixel matches background color
                        if (Math.abs(r - bgColor.r) < tolerance &&
                            Math.abs(g - bgColor.g) < tolerance &&
                            Math.abs(b - bgColor.b) < tolerance) {
                            data[i + 3] = 0; // Make transparent
                        }
                    }
                    
                    mctx.putImageData(imageData, 0, 0);
                }
                
                typoMaskCanvas = mc;
                generateTypoGrid();
                URL.revokeObjectURL(url);
            };
            
            img.src = url;
        }

        function reprocessTypoSvg() {

        function exportPDF() {
            // Pause animation to capture current frame
            const wasAnimating = params.animate;
            params.animate = false;
            
            // Force a render to update all particle positions and visibility
            render();
            
            // Create SVG immediately (render is synchronous)
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("width", canvas.width);
            svg.setAttribute("height", canvas.height);
            svg.setAttribute("viewBox", `0 0 ${canvas.width} ${canvas.height}`);
                
                // Background
                const bg = document.createElementNS(svgNS, "rect");
                bg.setAttribute("width", canvas.width);
                bg.setAttribute("height", canvas.height);
                bg.setAttribute("fill", params.bgColor);
                svg.appendChild(bg);
                
                // Add particles as paths (skip if in distorted mode, which uses typoParticles instead)
                if (params.typoBehavior !== 'distorted') {
                    particles.forEach(p => {
                        if (!p.visible) return;
                        
                        // Skip particles outside canvas bounds (canvas clips these automatically)
                        if (p.x < 0 || p.x >= canvas.width || p.y < 0 || p.y >= canvas.height) return;
                        
                        // Determine which shape and size to use
                        let currentShape = params.shape;
                        let currentCustomPathString = customParticlePathString;
                        let currentSize = params.size;
                        if (params.dualShape && p.useShapeB) {
                            currentShape = params.shapeB;
                            currentCustomPathString = customParticlePathStringB;
                            currentSize = params.sizeB;
                        }
                        
                        const s = currentSize * p.size;
                        const path = document.createElementNS(svgNS, "path");
                        let d = "";
                        
                        if (currentShape === 'triangle') {
                            const x1 = p.x, y1 = p.y - s/2;
                            const x2 = p.x - s/2, y2 = p.y + s/2;
                            const x3 = p.x + s/2, y3 = p.y + s/2;
                            
                            const cos = Math.cos(p.rot * Math.PI / 180);
                            const sin = Math.sin(p.rot * Math.PI / 180);
                            
                            const rx1 = (x1 - p.x) * cos - (y1 - p.y) * sin + p.x;
                            const ry1 = (x1 - p.x) * sin + (y1 - p.y) * cos + p.y;
                            const rx2 = (x2 - p.x) * cos - (y2 - p.y) * sin + p.x;
                            const ry2 = (x2 - p.x) * sin + (y2 - p.y) * cos + p.y;
                            const rx3 = (x3 - p.x) * cos - (y3 - p.y) * sin + p.x;
                            const ry3 = (x3 - p.x) * sin + (y3 - p.y) * cos + p.y;
                            
                            d = `M ${rx1} ${ry1} L ${rx2} ${ry2} L ${rx3} ${ry3} Z`;
                        } else if (currentShape === 'circle') {
                            const r = s/2;
                            d = `M ${p.x - r} ${p.y} A ${r} ${r} 0 1 1 ${p.x + r} ${p.y} A ${r} ${r} 0 1 1 ${p.x - r} ${p.y} Z`;
                        } else if (currentShape === 'square') {
                            const x1 = p.x - s/2, y1 = p.y - s/2;
                            const x2 = p.x + s/2, y2 = p.y - s/2;
                            const x3 = p.x + s/2, y3 = p.y + s/2;
                            const x4 = p.x - s/2, y4 = p.y + s/2;
                            
                            const cos = Math.cos(p.rot * Math.PI / 180);
                            const sin = Math.sin(p.rot * Math.PI / 180);
                            
                            const rx1 = (x1 - p.x) * cos - (y1 - p.y) * sin + p.x;
                            const ry1 = (x1 - p.x) * sin + (y1 - p.y) * cos + p.y;
                            const rx2 = (x2 - p.x) * cos - (y2 - p.y) * sin + p.x;
                            const ry2 = (x2 - p.x) * sin + (y2 - p.y) * cos + p.y;
