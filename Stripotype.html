<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strip Typography</title>
<link rel="preconnect" href="https://fonts.googleapis.com/">
<link href="./Stripotype_files/css2" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  font-family: 'Martian Mono', monospace !important;
}
body {
  background: #0a0a0a; color: #fff;
  display: flex; height: 100vh; overflow: hidden; padding: 20px; gap: 20px;
}

/* ── Canvas side ── */
#canvas-area {
  flex: 1; display: flex; justify-content: center; align-items: center;
  background: #000; border-radius: 12px; border: 1px solid #222;
  overflow: hidden; position: relative;
}
#canvas-area canvas {
  border: 1px solid #333; max-width: 100%; max-height: 100%; display: block;
}
#loader {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; background: #000; border-radius: 12px;
  font-size: 11px; letter-spacing: 0.15em; color: #555; text-transform: uppercase;
  transition: opacity 0.4s; pointer-events: none; z-index: 10;
}
#loader.gone { opacity: 0; }

/* ── Panel ── */
#panel {
  width: 420px; height: 100%; background: #111; border: 1px solid #222;
  border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  display: flex; flex-direction: column; overflow: hidden;
}
#panel-scroll {
  flex: 1; overflow-y: auto; padding: 25px; padding-bottom: 10px;
}
#panel-scroll::-webkit-scrollbar { display: none; }
#panel-scroll { scrollbar-width: none; }

/* ── Section ── */
.section { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #222; }
.section:last-child { margin-bottom: 0; border-bottom: none; }
.section-title {
  font-size: 13px; font-weight: 800; margin-bottom: 15px;
  text-transform: uppercase; letter-spacing: 0.5px; color: #fff;
}

/* ── Control row ── */
.ctrl { margin-bottom: 14px; }
.ctrl:last-child { margin-bottom: 0; }
.ctrl label { font-size: 10px; color: #888; text-transform: uppercase; display: block; margin-bottom: 6px; font-weight: 300; }
.val { color: #fff; font-weight: 700; float: right; font-size: 10px; }
input[type=range] { width: 100%; accent-color: #fff; cursor: pointer; display: block; }
input[type=text], input[type=number], select, textarea {
  width: 100%; background: #1a1a1a; border: 1px solid #333;
  color: #fff; padding: 10px; border-radius: 6px; font-size: 11px; outline: none;
}
input[type=number] { width: 80px; padding: 8px 10px; }
textarea { min-height: 70px; resize: vertical; line-height: 1.5; font-size: 13px; margin-bottom: 14px; }
input[type=color] { width: 100%; height: 35px; border: 1px solid #333; cursor: pointer; background: #1a1a1a; border-radius: 6px; padding: 2px; display: block; }

/* Two columns */
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.row2 .ctrl { margin-bottom: 0; }
.row-inline { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
.row-inline label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 300; white-space: nowrap; }
.row-inline input[type=number] { flex: 1; }
.row-inline span { color: #444; }

/* Buttons */
button {
  width: 100%; background: #fff; color: #000; border: none;
  padding: 12px; border-radius: 6px; cursor: pointer; font-size: 11px;
  font-weight: 700; margin-top: 10px; transition: background 0.15s;
}
button:hover { background: #e0e0e0; }
button.secondary {
  background: #1a1a1a; color: #888; border: 1px solid #333;
}
button.secondary:hover { background: #fff; color: #000; }
button.accent {
  background: #1a1a1a; color: #4d9fff; border: 1px solid #4d9fff;
}
button.accent:hover { background: #4d9fff; color: #000; }

/* Size pills */
.pills { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
.pill { background: #1a1a1a; color: #888; border: 1px solid #333; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 9px; font-family: 'Martian Mono', monospace; font-weight: 700; text-transform: uppercase; transition: all 0.12s; }
.pill:hover { background: #fff; color: #000; border-color: #fff; }

/* Toggle */
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.toggle-row label { font-size: 10px; color: #888; text-transform: uppercase; font-weight: 300; }
.tog { width: 36px; height: 20px; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; position: relative; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }
.tog.on { background: #fff; border-color: #fff; }
.knob { position: absolute; top: 3px; left: 3px; width: 12px; height: 12px; background: #444; border-radius: 50%; transition: all 0.15s; }
.tog.on .knob { left: 19px; background: #000; }

/* Font drop zone */
.dropzone {
  border: 1px dashed #444; border-radius: 6px; padding: 15px; text-align: center;
  cursor: pointer; background: #161616; font-size: 10px; color: #888;
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; transition: all 0.12s;
}
.dropzone:hover { border-color: #888; color: #ccc; }
.dropzone.loaded { border-color: #4caf50; color: #4caf50; }
#font-file { display: none; }
#font-name { font-size: 9px; color: #555; text-align: center; margin-bottom: 6px; }

/* Footer */
#panel-footer {
  background: #111; border-top: 1px solid #222; padding: 20px 25px;
  display: flex; flex-direction: column; gap: 8px;
}
.export-row { display: flex; gap: 8px; }
.export-row button { flex: 1; margin-top: 0; }

        <input type="range" id="sl-twt" min="0.2" max="8" step="0.1" value="1">

    </div>

    <!-- IRREGULARITY -->
    <div class="section">
      <div class="section-title">Irregularity</div>
      <div class="ctrl">
        <label>Displacement ↔ <span class="val" id="v-dx">23px</span></label>
        <input type="range" id="sl-dx" min="0" max="300" step="0.5" value="23">
      </div>
      <div class="ctrl">
        <label>Overrun ↕ <span class="val" id="v-or">3px</span></label>
        <input type="range" id="sl-or" min="-200" max="400" step="1" value="3">

      <div class="ctrl">
        <label>Overrun Variation <span class="val" id="v-ov">0.70</span></label>
        <input type="range" id="sl-ov" min="0" max="1" step="0.01" value="0.7">
      </div>
      <div class="ctrl">
        <label>Strip Angle <span class="val" id="v-ang">5.9°</span></label>

    <!-- BACKGROUND STRIPS -->
    <div class="section">
      <div class="section-title">Background Strips</div>
      <div class="ctrl">

        <input type="range" id="sl-bns" min="25" max="300" step="1" value="25">

      <div class="ctrl">
        <label>Thickness <span class="val" id="v-bth">0.55</span></label>
        <input type="range" id="sl-bth" min="0.01" max="3" step="0.005" value="0.55">
      </div>
      <div class="ctrl">
        <label>Orientation</label>
        <select id="sel-orient">
          <option value="vertical">Vertical</option>
          <option value="horizontal">Horizontal</option>
        </select>
      </div>
      <div class="row2">
        <div class="ctrl">
          <label>Gap Color</label>
          <input type="color" id="col-bg" value="#0a0a0a">
        </div>
        <div class="ctrl">
          <label>Strip Color</label>

      <div class="toggle-row">
        <label>Wireframe</label>
        <div class="tog" id="tog-bwf"><div class="knob"></div></div>
      </div>
      <div class="ctrl">
        <label>Wireframe Thickness <span class="val" id="v-bwt">1.0px</span></label>
        <input type="range" id="sl-bwt" min="0.2" max="8" step="0.1" value="1">
      </div>
      <div class="ctrl">
        <label>Displacement ↔ <span class="val" id="v-bdx">0px</span></label>
        <input type="range" id="sl-bdx" min="0" max="300" step="0.5" value="0">
      </div>
      <div class="ctrl">
        <label>Strip Angle <span class="val" id="v-bang">0.0°</span></label>
        <input type="range" id="sl-bang" min="0" max="45" step="0.1" value="0">
      </div>
      <div class="ctrl">
        <label>Seed <span class="val" id="v-bseed">42</span></label>
        <input type="range" id="sl-bseed" min="0" max="9999" step="1" value="42">

  </div><!-- /scroll -->

  <div id="panel-footer">
    <button class="secondary" id="btn-rnd">Randomize</button>
    <div class="export-row">
      <button id="btn-png">Export PNG</button>
      <button class="accent" id="btn-svg">Export SVG</button>
    </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  STATE — single source of truth, read directly by render()
// ═══════════════════════════════════════════════════════════════════
const S = {
  // Text
  text:          'نوار ها\nStrips',
  fontSize:      300,
  lineSpacing:   1.38,
  letterSpacing: 17,
  textAlign:     'center',
  fontFamily:    'Doran',
  textX:         0,
  textY:         65,

  // Canvas
  canvasW:     1280,
  canvasH:     900,
  exportScale: 3,

  // Background strips
  bgStrips:       25,
  bgThickness:    0.55,
  orientation:    'vertical',
  bgGapColor:     '#0a0a0a',
  bgStripColor:   '#0a0a0a',
  bgWireframe:    false,
  bgWireThick:    1.0,
  bgDisplacement: 0,    // lateral shift per strip (px)
  bgAngle:        0,    // max rotation per strip (degrees)
  bgSeed:         42,   // independent seed from text strips

  // Text strips
  textStrips:    289,
  textThickness: 1.37,
  hideTextFill:  false,   // when true, skip the solid text silhouette fill
  textGapColor:  '#0a0a0a',
  textStrip1:    '#1a6fff',
  textStrip2:    '#ff5c00',
  textWireframe: false,
  textWireThick: 1.0,

  // Irregularity
  displacement: 23,
  overrun:      3,
  overrunVar:   0.70,
  maxAngle:     5.9,
  seed:         527,
};


// ═══════════════════════════════════════════════════════════════════
//  TEXT MASK — renders text to offscreen canvas, builds pixel mask
// ═══════════════════════════════════════════════════════════════════
let mask     = null;  // Uint8Array
let maskW    = 0;
let maskH    = 0;
let maskReady = false;

function buildMask() {
  maskW = S.canvasW;
  maskH = S.canvasH;

  const off = document.createElement('canvas');
  off.width  = maskW;
  off.height = maskH;
  const ctx  = off.getContext('2d');

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, maskW, maskH);

  const { lines, fs, lineH, startY, xBase } = textLayout(maskW, maskH, 1);

  ctx.fillStyle     = '#fff';
  ctx.textBaseline  = 'middle';
  ctx.textAlign     = S.textAlign;
  ctx.font          = fontStr(fs);
  ctx.letterSpacing = S.letterSpacing + 'px';

  lines.forEach((ln, i) => ctx.fillText(ln, xBase, startY + i * lineH));

  const img  = ctx.getImageData(0, 0, maskW, maskH);
  mask       = new Uint8Array(maskW * maskH);
  for (let i = 0; i < maskW * maskH; i++) {
    mask[i] = img.data[i * 4] > 80 ? 1 : 0;
  }
  maskReady = true;
}

function insideMask(x, y) {
  if (!maskReady) return false;
  const xi = Math.max(0, Math.min(maskW - 1, Math.round(x)));
  const yi = Math.max(0, Math.min(maskH - 1, Math.round(y)));
  return mask[yi * maskW + xi] === 1;
}

// Returns [{y0,y1}] runs of text pixels along column x
function vertRuns(x) {
  if (!maskReady) return [];
  const xi = Math.max(0, Math.min(maskW - 1, Math.round(x)));
  const runs = []; let inRun = false, y0 = 0;
  for (let y = 0; y < maskH; y++) {
    const hit = mask[y * maskW + xi] === 1;
    if (hit && !inRun)      { inRun = true;  y0 = y; }
    else if (!hit && inRun) { inRun = false; runs.push({ y0, y1: y - 1 }); }
  }
  if (inRun) runs.push({ y0, y1: maskH - 1 });
  return runs;
}

// Returns [{x0,x1}] runs of text pixels along row y
function horizRuns(y) {
  if (!maskReady) return [];
  const yi = Math.max(0, Math.min(maskH - 1, Math.round(y)));
  const runs = []; let inRun = false, x0 = 0;
  for (let x = 0; x < maskW; x++) {
    const hit = mask[yi * maskW + x] === 1;
    if (hit && !inRun)      { inRun = true;  x0 = x; }
    else if (!hit && inRun) { inRun = false; runs.push({ x0, x1: x - 1 }); }
  }
  if (inRun) runs.push({ x0, x1: maskW - 1 });
  return runs;
}


// ═══════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════
function fontStr(fs) {
  return `900 ${fs}px '${S.fontFamily}', 'Bebas Neue', Impact, 'Arial Black', sans-serif`;
}

function textLayout(W, H, scale) {
  const lines  = S.text.split('\n');
  const fs     = S.fontSize * scale;
  const lineH  = fs * S.lineSpacing;
  const totalH = lines.length * lineH;
  const startY = H / 2 - totalH / 2 + lineH / 2 + S.textY * scale;
  const margin = 40 * scale;
  const xBase  = (S.textAlign === 'center' ? W / 2
               :  S.textAlign === 'left'   ? margin : W - margin)
               + S.textX * scale;
  return { lines, fs, lineH, startY, xBase };
}

// Seeded RNG — deterministic per seed value
function mkRng(seed) {
  let s = (seed * 1664525 + 1013904223) >>> 0;
  return () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
}

// Draw a vertical rect segment, optionally rotated
function vSeg(ctx, cx, y0, y1, hw, ang, scale, wire, thick) {
  const h = (y1 - y0) * scale;
  if (h < 0.5) return;
  const sx = cx * scale, sy = y0 * scale, shw = hw * scale;
  ctx.save();
  if (Math.abs(ang) > 0.001) {
    ctx.translate(sx, sy + h / 2);
    ctx.rotate(ang);
    wire ? (ctx.lineWidth = thick * scale, ctx.strokeRect(-shw, -h/2, shw*2, h))
         :  ctx.fillRect(-shw, -h/2, shw*2, h);
  } else {
    wire ? (ctx.lineWidth = thick * scale, ctx.strokeRect(sx - shw, sy, shw*2, h))
         :  ctx.fillRect(sx - shw, sy, shw*2, h);
  }
  ctx.restore();
}

// Draw a horizontal rect segment, optionally rotated
function hSeg(ctx, cy, x0, x1, hw, ang, scale, wire, thick) {
  const w = (x1 - x0) * scale;
  if (w < 0.5) return;
  const sx = x0 * scale, sy = cy * scale, shw = hw * scale;
  ctx.save();
  if (Math.abs(ang) > 0.001) {
    ctx.translate(sx + w/2, sy);
    ctx.rotate(ang);
    wire ? (ctx.lineWidth = thick * scale, ctx.strokeRect(-w/2, -shw, w, shw*2))
         :  ctx.fillRect(-w/2, -shw, w, shw*2);
  } else {
    wire ? (ctx.lineWidth = thick * scale, ctx.strokeRect(sx, sy - shw, w, shw*2))
         :  ctx.fillRect(sx, sy - shw, w, shw*2);
  }
  ctx.restore();
}

// Draw solid text fill
function drawTextFill(ctx, color, scale) {
  const W = S.canvasW * scale, H = S.canvasH * scale;
  const { lines, fs, lineH, startY, xBase } = textLayout(W, H, scale);
  ctx.save();
  ctx.fillStyle     = color;
  ctx.textBaseline  = 'middle';
  ctx.textAlign     = S.textAlign;
  ctx.font          = fontStr(fs);
  ctx.letterSpacing = (S.letterSpacing * scale) + 'px';
  lines.forEach((ln, i) => ctx.fillText(ln, xBase, startY + i * lineH));
  ctx.restore();
}


// ═══════════════════════════════════════════════════════════════════
//  RENDER
//
//  Steps:
//  1. Fill canvas with bgGapColor (gap color outside letters)
//  2. Draw background strips across entire canvas (bgStripColor)
//  3. Fill text silhouette with textGapColor (gap inside letters)
//  4. Draw text strips inside letter mask (textStrip1 / textStrip2)
//     — each strip is independently positioned, sized, overrun, angled
// ═══════════════════════════════════════════════════════════════════
function render(ctx, scale) {
  const W    = S.canvasW * scale;
  const H    = S.canvasH * scale;
  const vert = S.orientation === 'vertical';
  const span = vert ? S.canvasW : S.canvasH;

  // ── Background geometry ──────────────────────────────────────────
  const bgSlot = span / S.bgStrips;
  const bgHw   = (bgSlot * S.bgThickness) / 2;

  // ── Text strip geometry ──────────────────────────────────────────
  const tSlot = span / S.textStrips;
  const tHw = (tSlot * S.textThickness) / 2;

  // ── 1. Background fill ──────────────────────────────────────────
  ctx.fillStyle = S.bgGapColor;
  ctx.fillRect(0, 0, W, H);

  // ── 2. Background strip grid (full canvas) ──────────────────────
  if (S.bgWireframe) ctx.strokeStyle = S.bgStripColor;
  else               ctx.fillStyle   = S.bgStripColor;

  const bgRng    = mkRng(S.bgSeed);
  const bgPhases = Array.from({ length: S.bgStrips }, () => [bgRng(), bgRng()]);
  const bgAngR   = S.bgAngle * Math.PI / 180;

  for (let i = 0; i < S.bgStrips; i++) {
    const c   = (i + 0.5) * bgSlot;
    const [p1, p2] = bgPhases[i];
    const dx  = (p1 - 0.5) * 2 * S.bgDisplacement;
    const ang = (p2 - 0.5) * 2 * bgAngR;

    if (vert) {
      const cx = c + dx;
      vSeg(ctx, cx, 0, S.canvasH, bgHw, ang, scale, S.bgWireframe, S.bgWireThick);
    } else {
      const cy = c + dx;
      hSeg(ctx, cy, 0, S.canvasW, bgHw, ang, scale, S.bgWireframe, S.bgWireThick);
    }
  }

  // ── 3. Text gap fill ─────────────────────────────────────────────
  // Covers the bg strips inside the letter shape with textGapColor.
  // Skip when hideTextFill is on — only the text strips will be visible.
  if (!S.hideTextFill) {
    drawTextFill(ctx, S.textGapColor, scale);
  }

  // ── 4. Text strips ───────────────────────────────────────────────
  // Each strip: independently displaced, overrun, and angled
  const rng    = mkRng(S.seed);
  const phases = Array.from({ length: S.textStrips }, () =>
    [rng(), rng(), rng(), rng()]
  );
  const angR = S.maxAngle * Math.PI / 180;

  for (let i = 0; i < S.textStrips; i++) {
    const col = i % 2 === 0 ? S.textStrip1 : S.textStrip2;
    if (S.textWireframe) ctx.strokeStyle = col;
    else                 ctx.fillStyle   = col;

    const [p1, p2, p3, p4] = phases[i];
    const center = (i + 0.5) * tSlot;

    // Displacement (lateral shift)
    const dx = (p1 - 0.5) * 2 * S.displacement;

    // Overrun (extension beyond letter boundary)
    const orTop = S.overrun + S.overrun * S.overrunVar * (p2 - 0.5) * 2;
    const orBot = S.overrun + S.overrun * S.overrunVar * (p3 - 0.5) * 2;

    // Per-strip angle
    const ang = (p4 - 0.5) * 2 * angR;

    if (vert) {
      const cx   = center + dx;
      const runs = vertRuns(center);
      for (const { y0, y1 } of runs) {
        vSeg(ctx, cx, y0 - orTop, y1 + orBot, tHw, ang, scale,
             S.textWireframe, S.textWireThick);
      }
    } else {
      const cy   = center + dx;
      const runs = horizRuns(center);
      for (const { x0, x1 } of runs) {
        hSeg(ctx, cy, x0 - orTop, x1 + orBot, tHw, ang, scale,
             S.textWireframe, S.textWireThick);
      }
    }
  }
}


// ═══════════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');

function resizeCanvas(w, h) {
  S.canvasW      = w;
  S.canvasH      = h;
  canvas.width   = w;
  canvas.height  = h;
}

function redraw() {
  if (!maskReady) return;
  render(canvas.getContext('2d'), 1);
}

// Build mask then draw — call whenever text/font/canvas size changes
function rebuild() {
  const ldr = document.getElementById('loader');
  ldr.classList.remove('gone');
  // Use setTimeout so the loader has time to show before the synchronous mask build
  setTimeout(() => {
    buildMask();
    redraw();
    ldr.classList.add('gone');
  }, 10);
}


// ═══════════════════════════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════════════════════════
function exportPNG() {
  if (!maskReady) return;
  const sc  = S.exportScale;
  const off = document.createElement('canvas');
  off.width  = Math.round(S.canvasW * sc);
  off.height = Math.round(S.canvasH * sc);
  render(off.getContext('2d'), sc);
  off.toBlob(blob => {
    const a    = document.createElement('a');
    a.download = `strip-typo-${Date.now()}.png`;
    a.href     = URL.createObjectURL(blob);
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 3000);
  }, 'image/png');
}

function exportSVG() {
  if (!maskReady) return;
  const W    = S.canvasW;
  const H    = S.canvasH;
  const vert = S.orientation === 'vertical';
  const span = vert ? W : H;
  const bgSlot = span / S.bgStrips;
  const bgHw   = (bgSlot * S.bgThickness) / 2;
  const tSlot  = span / S.textStrips;
  const tHw = (tSlot * S.textThickness) / 2;
  const angR   = S.maxAngle * Math.PI / 180;
  const px     = n => Math.round(n * 100) / 100;

  const parts = [`<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`];

  // 1. Background fill
  parts.push(`  <rect width="${W}" height="${H}" fill="${S.bgGapColor}"/>`);

  // 2. Background strips
  const bgRngSvg    = mkRng(S.bgSeed);
  const bgPhasesSvg = Array.from({ length: S.bgStrips }, () => [bgRngSvg(), bgRngSvg()]);
  const bgAngRSvg   = S.bgAngle * Math.PI / 180;

  for (let i = 0; i < S.bgStrips; i++) {
    const c = (i + 0.5) * bgSlot;
    const [p1, p2] = bgPhasesSvg[i];
    const dx  = (p1 - 0.5) * 2 * S.bgDisplacement;
    const ang = (p2 - 0.5) * 2 * bgAngRSvg;
    const angDeg = px(ang * 180 / Math.PI);
    const fill = S.bgWireframe
      ? `fill="none" stroke="${S.bgStripColor}" stroke-width="${S.bgWireThick}"`
      : `fill="${S.bgStripColor}"`;
    if (vert) {
      const cx = c + dx;
      const tr = Math.abs(ang) > 0.001 ? ` transform="rotate(${angDeg},${px(cx)},${px(H/2)})"` : '';
      parts.push(`  <rect x="${px(cx - bgHw)}" y="0" width="${px(bgHw*2)}" height="${H}" ${fill}${tr}/>`);
    } else {
      const cy = c + dx;
      const tr = Math.abs(ang) > 0.001 ? ` transform="rotate(${angDeg},${px(W/2)},${px(cy)})"` : '';
      parts.push(`  <rect x="0" y="${px(cy - bgHw)}" width="${W}" height="${px(bgHw*2)}" ${fill}${tr}/>`);
    }
  }

  // 3. Text gap fill
  const { lines, fs, lineH, startY, xBase } = textLayout(W, H, 1);
  const anchor = S.textAlign === 'center' ? 'middle' : S.textAlign === 'left' ? 'start' : 'end';
  const ls = S.letterSpacing ? ` letter-spacing="${S.letterSpacing}"` : '';
  const spans = lines.map((ln, i) => `<tspan x="${px(xBase)}" y="${px(startY + i * lineH)}">${ln}</tspan>`).join('');
  parts.push(`  <text font-family="${S.fontFamily}, Bebas Neue, Impact" font-size="${px(fs)}" font-weight="900" text-anchor="${anchor}" dominant-baseline="middle" fill="${S.textGapColor}"${ls}>${spans}</text>`);

  // 4. Text strips
  const rng    = mkRng(S.seed);
  const phases = Array.from({ length: S.textStrips }, () => [rng(), rng(), rng(), rng()]);
  parts.push('  <g>');
  for (let i = 0; i < S.textStrips; i++) {
    const col  = i % 2 === 0 ? S.textStrip1 : S.textStrip2;
    const fill = S.textWireframe
      ? `fill="none" stroke="${col}" stroke-width="${S.textWireThick}"`
      : `fill="${col}"`;
    const [p1, p2, p3, p4] = phases[i];
    const center = (i + 0.5) * tSlot;
    const dx     = (p1 - 0.5) * 2 * S.displacement;
    const orTop  = S.overrun + S.overrun * S.overrunVar * (p2 - 0.5) * 2;
    const orBot  = S.overrun + S.overrun * S.overrunVar * (p3 - 0.5) * 2;
    const ang    = (p4 - 0.5) * 2 * angR;
    const angDeg = px(ang * 180 / Math.PI);

    if (vert) {
      const cx   = center + dx;
      const runs = vertRuns(center);
      for (const { y0, y1 } of runs) {
        const ry0 = y0 - orTop, ry1 = y1 + orBot, h = ry1 - ry0;
        if (h < 0.5) continue;
        const tr = Math.abs(ang) > 0.001
          ? ` transform="rotate(${angDeg},${px(cx)},${px(ry0 + h/2)})"` : '';
        parts.push(`    <rect x="${px(cx - tHw)}" y="${px(ry0)}" width="${px(tHw*2)}" height="${px(h)}" ${fill}${tr}/>`);
      }
    } else {
      const cy   = center + dx;
      const runs = horizRuns(center);
      for (const { x0, x1 } of runs) {
        const rx0 = x0 - orTop, rx1 = x1 + orBot, w = rx1 - rx0;
        if (w < 0.5) continue;
        const tr = Math.abs(ang) > 0.001
          ? ` transform="rotate(${angDeg},${px(rx0 + w/2)},${px(cy)})"` : '';
        parts.push(`    <rect x="${px(rx0)}" y="${px(cy - tHw)}" width="${px(w)}" height="${px(tHw*2)}" ${fill}${tr}/>`);
      }
    }
  }
  parts.push('  </g>');
  parts.push('</svg>');

  const blob = new Blob([parts.join('\n')], { type: 'image/svg+xml;charset=utf-8' });
  const a    = document.createElement('a');
  a.download = `strip-typo-${Date.now()}.svg`;
  a.href     = URL.createObjectURL(blob);
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}


// ═══════════════════════════════════════════════════════════════════
//  CONTROLS WIRING
//  Each control updates S directly, then calls redraw() or rebuild().
//  rebuild() is only needed when the text mask must be re-rasterised
//  (text content, font, font size, letter spacing, text position, canvas size).
//  Everything else just calls redraw().
// ═══════════════════════════════════════════════════════════════════

// Helper: wire a range slider to a state key, update a display span, then call fn
function wireRange(id, valId, key, fmt, fn) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    S[key] = parseFloat(sl.value);
    if (vl) vl.textContent = fmt(S[key]);
    fn();
  });
}

// Helper: wire a color picker
function wireColor(id, key) {
  document.getElementById(id).addEventListener('input', function () {
    S[key] = this.value;
    redraw();
  });
}

// Helper: wire a toggle
function wireToggle(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('click', () => {
    S[key] = !S[key];
    el.classList.toggle('on', S[key]);
    redraw();
  });
}

// ── Font upload ───────────────────────────────────────────────────
const fontDz = document.getElementById('font-dz');
document.getElementById('font-file').addEventListener('change', e => {
  if (e.target.files[0]) loadFont(e.target.files[0]);
});
fontDz.addEventListener('click', () => document.getElementById('font-file').click());
fontDz.addEventListener('dragover',  e => { e.preventDefault(); fontDz.classList.add('drag'); });
fontDz.addEventListener('dragleave', ()  => fontDz.classList.remove('drag'));
fontDz.addEventListener('drop', e => {
  e.preventDefault(); fontDz.classList.remove('drag');
  if (e.dataTransfer.files[0]) loadFont(e.dataTransfer.files[0]);
});

async function loadFont(file) {
  const url = URL.createObjectURL(file);
  const nm  = 'UF_' + Date.now();
  try {
    fontDz.textContent = 'Loading…';
    const face = new FontFace(nm, `url(${url})`);
    await face.load();
    document.fonts.add(face);
    S.fontFamily = nm;
    const name = file.name.replace(/\.(ttf|otf|woff2?)$/i, '');
    fontDz.textContent = '✓ ' + name;
    fontDz.classList.add('loaded');
    document.getElementById('font-name').textContent = 'Active: ' + name;
    rebuild();
  } catch (err) {
    fontDz.textContent = '✗ Load failed';
    console.error(err);
  }
}

// ── Sync sliders → display values (used after randomize) ──────────
function syncSliders() {
  const map = [
    ['sl-bns', 'v-bns', v => Math.round(v),       'bgStrips'],
    ['sl-bth', 'v-bth', v => v.toFixed(2),         'bgThickness'],
    ['sl-bdx', 'v-bdx', v => Math.round(v)+'px',   'bgDisplacement'],
    ['sl-bang','v-bang',v => v.toFixed(1)+'°',      'bgAngle'],
    ['sl-bseed','v-bseed',v => Math.round(v),       'bgSeed'],
    ['sl-tns', 'v-tns', v => Math.round(v),        'textStrips'],
    ['sl-tth', 'v-tth', v => v.toFixed(2),         'textThickness'],
    ['sl-dx',  'v-dx',  v => Math.round(v) + 'px', 'displacement'],
    ['sl-or',  'v-or',  v => Math.round(v) + 'px', 'overrun'],
    ['sl-ov',  'v-ov',  v => v.toFixed(2),         'overrunVar'],
    ['sl-ang', 'v-ang', v => v.toFixed(1) + '°',   'maxAngle'],
    ['sl-seed','v-seed',v => Math.round(v),         'seed'],
  ];
  map.forEach(([slId, vlId, fmt, key]) => {
    const sl = document.getElementById(slId);
    const vl = document.getElementById(vlId);
    if (sl) sl.value = S[key];
    if (vl) vl.textContent = fmt(S[key]);
  });
}
